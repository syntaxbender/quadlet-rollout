name: build-and-deploy
on:
  push:
    branches: [main]

jobs:
  build_push_and_notify:
    runs-on: ubuntu-latest
    env:
      TZ: UTC
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: echo "build placeholder"

      - name: Push image
        run: echo "push placeholder"

      - name: Derive HMAC token
        env:
          SALT_SECRET: ${{ secrets.DEPLOY_SALT_SECRET }}
        run: |
          TIME_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PAYLOAD="$TIME_UTC"$'\n'"${GITHUB_SHA,,}"
          TOKEN=$(printf "%s" "$PAYLOAD" | openssl dgst -sha256 -hmac "$SALT_SECRET" -binary | xxd -p -c 256)
          echo "DEPLOY_TIME_UTC=$TIME_UTC" >> "$GITHUB_ENV"
          echo "DEPLOY_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: Notify webhook
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          curl -fsS -X POST "$DEPLOY_URL/deploy" \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            -H "X-Deploy-Time-UTC: $DEPLOY_TIME_UTC" \
            -H "X-Deploy-Sha: $GITHUB_SHA"
