server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name webhook.example.com;

    ssl_certificate /etc/letsencrypt/live/example-main/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example-main/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    client_max_body_size 8k;

    location = /healthz {
        proxy_pass http://127.0.0.1:18080/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location = /deploy {
        limit_except POST {
            deny all;
        }

        proxy_pass http://127.0.0.1:18080/deploy;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    location / {
        return 404;
    }
}
